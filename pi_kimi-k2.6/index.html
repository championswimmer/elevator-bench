<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevator Simulator</title>
    <!-- Model: kimi-k2.6 | Tool: pi | Provider: openrouter -->
    
<link rel="stylesheet" crossorigin href="./index-czg862qv.css"><script type="module" crossorigin src="./index-4mvt2ct7.js"></script></head>
<body>
    <div class="container">
        <header>
            <h1>Elevator Simulator</h1>
            <div class="info">
                <span>Model: kimi-k2.6</span>
                <span>Tool: pi</span>
                <span>Provider: openrouter</span>
            </div>
        </header>

        <div class="controls">
            <div class="config">
                <label>
                    Floors:
                    <input type="number" id="floorCount" value="10" min="2" max="20">
                </label>
                <label>
                    Elevators:
                    <input type="number" id="elevatorCount" value="4" min="1" max="8">
                </label>
                <button id="resetBtn">Reset Simulation</button>
            </div>
        </div>

        <div class="simulation">
            <div class="building" id="building">
                <!-- Floors and elevators generated by JS -->
            </div>

            <div class="elevator-panels" id="elevatorPanels">
                <!-- Elevator control panels generated by JS -->
            </div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color idle"></div>
                <span>Idle</span>
            </div>
            <div class="legend-item">
                <div class="legend-color moving-up"></div>
                <span>Moving Up</span>
            </div>
            <div class="legend-item">
                <div class="legend-color moving-down"></div>
                <span>Moving Down</span>
            </div>
            <div class="legend-item">
                <div class="legend-color door-open"></div>
                <span>Door Open</span>
            </div>
        </div>
    </div>

    
</body>
</html>
