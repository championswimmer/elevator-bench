<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevator Simulator</title>

<body>
  <header class="site-header">
    <h1>Elevator Simulator</h1>
    <div class="info-bar">
      <span class="info-item"><span class="info-key">Tool</span><span class="info-val">claude-code</span></span>
      <span class="info-item"><span class="info-key">Model</span><span class="info-val">claude-opus-4.7</span></span>

        <span><span class="dot car"></span>Car call</span>
      </div>
    </section>

    <aside class="panels-section">
      <div class="section-title">Elevator Panels</div>
      <div id="elevator-panels"></div>
    </aside>
  </main>

</html>
