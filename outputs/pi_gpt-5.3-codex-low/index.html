<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elevator Simulator</title>
    <meta name="description" content="Elevator simulation with multiple elevators and floor requests" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Elevator Simulator</h1>
      <p class="meta">Model: gpt-5.3-codex:low · Tool: pi (standard) · Provider: github</p>
    </header>

    <main class="app">
      <section class="building-panel">
        <div class="building" id="building"></div>
      </section>

      <aside class="status-panel">
        <h2>System Status</h2>
        <div id="status"></div>
        <div class="legend">
          <p><span class="dot idle"></span> Idle</p>
          <p><span class="dot up"></span> Moving Up</p>
          <p><span class="dot down"></span> Moving Down</p>
        </div>
      </aside>
    </main>

    <script type="module" src="./script.ts"></script>
  </body>
</html>
