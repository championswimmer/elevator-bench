<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevator Simulator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="info-bar">
        <h1>Elevator Simulator</h1>
        <div class="info-details">
            <span><strong>Model:</strong> claude-haiku-4.5</span>
            <span><strong>Provider:</strong> github</span>
            <span><strong>Tool:</strong> pi</span>
            <span><strong>Port:</strong> 8801</span>
        </div>
    </div>
    
    <div class="container">
        <div class="simulator">
            <div class="building">
                <div class="elevators" id="elevators-container"></div>
                <div class="floors" id="floors-container"></div>
            </div>
            <div class="stats">
                <h2>Simulator Stats</h2>
                <div id="stats-content">
                    <p><strong>Total Floors:</strong> <span id="stat-floors">0</span></p>
                    <p><strong>Total Elevators:</strong> <span id="stat-elevators">0</span></p>
                    <p><strong>Requests Served:</strong> <span id="stat-requests">0</span></p>
                    <p><strong>Current Queue:</strong> <span id="stat-queue">0</span></p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.ts" type="module"></script>
</body>
</html>
